<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- L6: 글로벌 본사 타워 — 초고층 단일 타워, 골든 야간 도시. -->
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e3e"/>
      <stop offset="50%" stop-color="#3e2068"/>
      <stop offset="100%" stop-color="#7e3858"/>
    </linearGradient>
    <linearGradient id="tower6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e8b8"/>
      <stop offset="60%" stop-color="#e0c898"/>
      <stop offset="100%" stop-color="#a08858"/>
    </linearGradient>
    <linearGradient id="glass6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5d8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d8a858" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="ground6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a4a"/>
      <stop offset="100%" stop-color="#1a0e25"/>
