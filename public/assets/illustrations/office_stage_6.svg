  <g fill="#fff5d8" opacity="0.85">
    <rect x="202" y="62" width="3" height="3"/>
    <rect x="208" y="62" width="3" height="3"/>
    <rect x="214" y="62" width="3" height="3"/>
    <rect x="202" y="68" width="3" height="3"/>
