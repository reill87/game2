  <circle cx="135" cy="88" r="1.2" fill="#f8e8a8" opacity="0.9"/>
  <circle cx="185" cy="88" r="1.2" fill="#f8e8a8" opacity="0.9"/>
  <circle cx="205" cy="88" r="1.2" fill="#f8e8a8" opacity="0.9"/>

  <!-- Tower base banner -->
  <rect x="146" y="76" width="28" height="6" fill="#1a0e3e" stroke="#f8e8b8" stroke-width="0.4"/>
