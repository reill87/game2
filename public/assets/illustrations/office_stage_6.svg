  <!-- Distant skyline silhouette -->
  <g fill="#1a0e3e" opacity="0.85">
    <rect x="0" y="64" width="14" height="20"/>
    <rect x="14" y="58" width="12" height="26"/>
    <rect x="26" y="62" width="16" height="22"/>
    <rect x="42" y="56" width="14" height="28"/>
    <rect x="56" y="60" width="20" height="24"/>
    <rect x="76" y="54" width="14" height="30"/>
    <rect x="232" y="58" width="14" height="26"/>
    <rect x="246" y="54" width="18" height="30"/>
    <rect x="264" y="60" width="14" height="24"/>
    <rect x="278" y="56" width="16" height="28"/>
    <rect x="294" y="62" width="14" height="22"/>
    <rect x="308" y="58" width="12" height="26"/>
