    <rect x="18" y="64" width="2" height="2"/>
    <rect x="32" y="66" width="2" height="2"/>
    <rect x="48" y="62" width="2" height="2"/>
    <rect x="63" y="66" width="2" height="2"/>
    <rect x="80" y="60" width="2" height="2"/>
    <rect x="237" y="64" width="2" height="2"/>
    <rect x="252" y="60" width="2" height="2"/>
    <rect x="270" y="66" width="2" height="2"/>
    <rect x="285" y="62" width="2" height="2"/>
