<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- L5: 판교 R&D 메가 캠퍼스 — 다중 동 캠퍼스, 보라톤 야간. -->
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#5a3a8a"/>
    </linearGradient>
    <linearGradient id="bldg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c8e8"/>
      <stop offset="100%" stop-color="#9080b8"/>
    </linearGradient>
    <linearGradient id="glass5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b8f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7a5fbd" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lawn5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8a5a"/>
      <stop offset="100%" stop-color="#1a5a35"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="320" height="100" fill="url(#sky5)"/>

  <!-- Stars -->
  <circle cx="30" cy="8" r="0.7" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="14" r="0.9" fill="#fff" opacity="0.9"/>
  <circle cx="140" cy="6" r="0.6" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="11" r="0.8" fill="#fff" opacity="0.8"/>
  <circle cx="260" cy="5" r="0.7" fill="#fff" opacity="0.7"/>
  <circle cx="290" cy="13" r="0.6" fill="#fff" opacity="0.6"/>

  <!-- Moon -->
  <circle cx="270" cy="22" r="9" fill="#f8e8a8" opacity="0.95"/>
  <circle cx="266" cy="20" r="2.5" fill="#d8c890" opacity="0.5"/>

  <!-- Distant skyline -->
  <rect x="0" y="65" width="320" height="6" fill="#3a2a5a" opacity="0.6"/>

  <!-- Lawn / plaza -->
  <rect x="0" y="80" width="320" height="20" fill="url(#lawn5)"/>

  <!-- Walkway -->
  <path d="M 0 92 Q 80 86 160 90 Q 240 94 320 88" stroke="#a89cc8" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Building A (left, mid-rise) -->
  <rect x="20" y="40" width="50" height="40" fill="url(#bldg5)"/>
  <rect x="22" y="42" width="46" height="36" fill="url(#glass5)"/>
  <!-- A windows grid -->
  <g fill="#fff8c8" opacity="0.85">
    <rect x="26" y="46" width="6" height="4"/>
    <rect x="36" y="46" width="6" height="4"/>
    <rect x="46" y="46" width="6" height="4"/>
    <rect x="56" y="46" width="6" height="4"/>
    <rect x="26" y="54" width="6" height="4"/>
    <rect x="46" y="54" width="6" height="4"/>
    <rect x="56" y="54" width="6" height="4"/>
    <rect x="26" y="62" width="6" height="4"/>
    <rect x="36" y="62" width="6" height="4"/>
    <rect x="46" y="62" width="6" height="4"/>
    <rect x="56" y="62" width="6" height="4"/>
    <rect x="36" y="70" width="6" height="4"/>
    <rect x="46" y="70" width="6" height="4"/>
  </g>

  <!-- Building B (center, tallest) -->
  <rect x="120" y="22" width="56" height="58" fill="url(#bldg5)"/>
  <rect x="122" y="24" width="52" height="54" fill="url(#glass5)"/>
  <!-- B windows -->
  <g fill="#fff8c8" opacity="0.9">
    <rect x="128" y="30" width="6" height="4"/>
    <rect x="138" y="30" width="6" height="4"/>
    <rect x="148" y="30" width="6" height="4"/>
    <rect x="158" y="30" width="6" height="4"/>
    <rect x="168" y="30" width="6" height="4"/>
    <rect x="128" y="38" width="6" height="4"/>
    <rect x="148" y="38" width="6" height="4"/>
    <rect x="158" y="38" width="6" height="4"/>
    <rect x="168" y="38" width="6" height="4"/>
    <rect x="128" y="46" width="6" height="4"/>
    <rect x="138" y="46" width="6" height="4"/>
    <rect x="148" y="46" width="6" height="4"/>
    <rect x="168" y="46" width="6" height="4"/>
    <rect x="128" y="54" width="6" height="4"/>
    <rect x="138" y="54" width="6" height="4"/>
    <rect x="158" y="54" width="6" height="4"/>
    <rect x="168" y="54" width="6" height="4"/>
    <rect x="128" y="62" width="6" height="4"/>
    <rect x="138" y="62" width="6" height="4"/>
    <rect x="148" y="62" width="6" height="4"/>
    <rect x="158" y="62" width="6" height="4"/>
    <rect x="138" y="70" width="6" height="4"/>
    <rect x="148" y="70" width="6" height="4"/>
    <rect x="158" y="70" width="6" height="4"/>
  </g>
  <!-- B antenna -->
  <rect x="146" y="14" width="2" height="10" fill="#a8a0c8"/>
  <circle cx="147" cy="14" r="1.5" fill="#ff5f5f"/>

  <!-- Building C (right, mid-rise) -->
  <rect x="220" y="36" width="56" height="44" fill="url(#bldg5)"/>
  <rect x="222" y="38" width="52" height="40" fill="url(#glass5)"/>
  <!-- C windows -->
  <g fill="#fff8c8" opacity="0.85">
    <rect x="228" y="44" width="6" height="4"/>
    <rect x="238" y="44" width="6" height="4"/>
    <rect x="248" y="44" width="6" height="4"/>
    <rect x="258" y="44" width="6" height="4"/>
    <rect x="268" y="44" width="6" height="4"/>
    <rect x="228" y="52" width="6" height="4"/>
    <rect x="248" y="52" width="6" height="4"/>
    <rect x="258" y="52" width="6" height="4"/>
    <rect x="268" y="52" width="6" height="4"/>
    <rect x="228" y="60" width="6" height="4"/>
    <rect x="238" y="60" width="6" height="4"/>
    <rect x="248" y="60" width="6" height="4"/>
    <rect x="268" y="60" width="6" height="4"/>
    <rect x="238" y="68" width="6" height="4"/>
    <rect x="248" y="68" width="6" height="4"/>
    <rect x="258" y="68" width="6" height="4"/>
  </g>

  <!-- Connecting bridge -->
  <rect x="70" y="56" width="50" height="6" fill="#9080b8" opacity="0.85"/>
  <rect x="176" y="50" width="44" height="6" fill="#9080b8" opacity="0.85"/>

  <!-- Trees -->
  <circle cx="10" cy="82" r="5" fill="#2a6a3a"/>
  <circle cx="92" cy="82" r="4" fill="#2a6a3a"/>
  <circle cx="195" cy="82" r="4" fill="#2a6a3a"/>
  <circle cx="305" cy="82" r="5" fill="#2a6a3a"/>
</svg>
