<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- 강남 자가 사옥 — 낮 분위기, 럭셔리 오피스 빌딩 외관 + 로비 -->
  <defs>
    <linearGradient id="skyG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a7fc4"/>
      <stop offset="1" stop-color="#9bb8e8"/>
    </linearGradient>
    <linearGradient id="bldgG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a38"/>
      <stop offset="1" stop-color="#1e1e2c"/>
    </linearGradient>
    <linearGradient id="glassG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f6fff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a5acc" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="floorG3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a22"/>
      <stop offset="1" stop-color="#2a2a38"/>
    </linearGradient>
  </defs>

  <!-- 하늘 배경 -->
  <rect x="0" y="0" width="320" height="100" fill="url(#skyG3)"/>

  <!-- 원거리 빌딩 실루엣 (뒤) -->
  <rect x="0" y="30" width="30" height="70" fill="#4a5a7a" opacity="0.6"/>
  <rect x="285" y="25" width="35" height="75" fill="#4a5a7a" opacity="0.6"/>
  <rect x="270" y="35" width="18" height="65" fill="#4a5a7a" opacity="0.5"/>

  <!-- 메인 사옥 외관 빌딩 (중앙) — 유리 커튼월 고층 -->
  <rect x="80" y="4" width="160" height="96" fill="url(#bldgG3)"/>
  <!-- 빌딩 좌우 테두리(깊이감) -->
  <rect x="80" y="4" width="4" height="96" fill="#4a4a62" opacity="0.8"/>
  <rect x="236" y="4" width="4" height="96" fill="#0e0e12" opacity="0.6"/>

  <!-- 큰 통창 (커튼월 유리) 3열 4행 -->
  <!-- 1열 -->
  <rect x="90" y="8" width="34" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="90" y="32" width="34" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="90" y="56" width="34" height="20" fill="url(#glassG3)" rx="1"/>
  <!-- 2열 (중앙) -->
  <rect x="130" y="8" width="60" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="130" y="32" width="60" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="130" y="56" width="60" height="20" fill="url(#glassG3)" rx="1"/>
  <!-- 3열 -->
  <rect x="196" y="8" width="34" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="196" y="32" width="34" height="20" fill="url(#glassG3)" rx="1"/>
  <rect x="196" y="56" width="34" height="20" fill="url(#glassG3)" rx="1"/>

  <!-- 햇빛 반사 하이라이트 (유리에 걸림) -->
  <rect x="91" y="9" width="6" height="17" fill="#f2f2ff" opacity="0.18" rx="1"/>
  <rect x="131" y="9" width="8" height="17" fill="#f2f2ff" opacity="0.15" rx="1"/>
  <rect x="197" y="9" width="6" height="17" fill="#f2f2ff" opacity="0.18" rx="1"/>
  <rect x="131" y="33" width="8" height="17" fill="#f2f2ff" opacity="0.10" rx="1"/>

  <!-- 회사 로고 간판 — 빌딩 상단 중앙 -->
  <rect x="134" y="10" width="52" height="14" fill="#f2c94c" opacity="0.95" rx="2"/>
  <text x="160" y="20" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#0e0e12">KAKAO</text>

  <!-- 로비 입구 (1층) -->
  <rect x="130" y="78" width="60" height="22" fill="#2a2a38"/>
  <!-- 로비 자동문 -->
  <rect x="138" y="80" width="20" height="18" fill="#4f6fff" opacity="0.45" rx="1"/>
  <rect x="162" y="80" width="20" height="18" fill="#4f6fff" opacity="0.45" rx="1"/>
  <!-- 자동문 손잡이 -->
  <line x1="156" y1="88" x2="159" y2="88" stroke="#9b9bb0" stroke-width="1.2"/>
  <line x1="161" y1="88" x2="164" y2="88" stroke="#9b9bb0" stroke-width="1.2"/>
  <!-- 로비 안내데스크 실루엣 -->
  <rect x="142" y="90" width="36" height="5" fill="#4a4a62" rx="1"/>

  <!-- 태양 (우상단) -->
  <circle cx="296" cy="14" r="9" fill="#f2c94c" opacity="0.9"/>
  <line x1="296" y1="2" x2="296" y2="0" stroke="#f2c94c" stroke-width="1.5" opacity="0.7"/>
  <line x1="308" y1="14" x2="312" y2="14" stroke="#f2c94c" stroke-width="1.5" opacity="0.7"/>
  <line x1="304" y1="6" x2="307" y2="3" stroke="#f2c94c" stroke-width="1.5" opacity="0.7"/>
  <line x1="304" y1="22" x2="307" y2="25" stroke="#f2c94c" stroke-width="1.5" opacity="0.7"/>

  <!-- 조경 — 정원 나무 (좌측) -->
  <rect x="36" y="80" width="8" height="20" fill="#6a4a30"/>
  <ellipse cx="40" cy="72" rx="14" ry="12" fill="#3ec07b" opacity="0.9"/>
  <ellipse cx="34" cy="78" rx="9" ry="8" fill="#2ea86a" opacity="0.8"/>

  <!-- 조경 — 정원 나무 (우측) -->
  <rect x="278" y="80" width="8" height="20" fill="#6a4a30"/>
  <ellipse cx="282" cy="72" rx="14" ry="12" fill="#3ec07b" opacity="0.9"/>
  <ellipse cx="288" cy="78" rx="9" ry="8" fill="#2ea86a" opacity="0.8"/>

  <!-- 보도 + 차 (전경) -->
  <rect x="0" y="92" width="320" height="8" fill="url(#floorG3)"/>
  <!-- 차량 (좌) -->
  <rect x="10" y="86" width="44" height="14" fill="#4a4a62" rx="3"/>
  <rect x="14" y="82" width="28" height="10" fill="#3a3a48" rx="2"/>
  <circle cx="18" cy="100" r="4" fill="#2a2a38"/>
  <circle cx="46" cy="100" r="4" fill="#2a2a38"/>
  <rect x="50" y="92" width="4" height="3" fill="#e55f5f" opacity="0.8"/>
  <!-- 차량 (우) -->
  <rect x="268" y="86" width="44" height="14" fill="#4a4a62" rx="3"/>
  <rect x="278" y="82" width="28" height="10" fill="#3a3a48" rx="2"/>
  <circle cx="276" cy="100" r="4" fill="#2a2a38"/>
  <circle cx="304" cy="100" r="4" fill="#2a2a38"/>
  <rect x="266" y="92" width="4" height="3" fill="#f2c94c" opacity="0.8"/>
</svg>
