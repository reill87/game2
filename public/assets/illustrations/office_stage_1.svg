<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- 분당 셰어오피스 — 좁은 공유 책상 배너 -->
  <defs>
    <linearGradient id="wallG1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2e3c"/>
      <stop offset="1" stop-color="#23232f"/>
    </linearGradient>
  </defs>
  <!-- 벽 -->
  <rect x="0" y="0" width="320" height="78" fill="url(#wallG1)"/>
  <!-- 바닥 -->
  <rect x="0" y="78" width="320" height="22" fill="#1a1a22"/>
  <line x1="0" y1="78" x2="320" y2="78" stroke="#4a4a62" stroke-width="1"/>
  <!-- 노출 배관(천장) -->
  <line x1="0" y1="10" x2="320" y2="10" stroke="#6a6a78" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="60" cy="10" r="2.5" fill="#6a6a78"/>
  <circle cx="180" cy="10" r="2.5" fill="#6a6a78"/>
  <circle cx="270" cy="10" r="2.5" fill="#6a6a78"/>
  <!-- 천장 형광등 -->
  <rect x="92" y="4" width="60" height="4" fill="#f2c94c" opacity="0.6" rx="1.5"/>
  <rect x="220" y="4" width="50" height="4" fill="#f2c94c" opacity="0.55" rx="1.5"/>
  <!-- 작은 창문 -->
  <rect x="14" y="22" width="44" height="32" fill="#3a3a48" stroke="#4a4a62" stroke-width="1.5"/>
  <line x1="36" y1="22" x2="36" y2="54" stroke="#4a4a62" stroke-width="1"/>
  <line x1="14" y1="38" x2="58" y2="38" stroke="#4a4a62" stroke-width="1"/>
  <!-- 좁은 공유 책상 (긴 직사각형) -->
  <rect x="6" y="64" width="308" height="6" fill="#6a6a78"/>
  <rect x="10" y="70" width="3" height="14" fill="#4a4a62"/>
  <rect x="158" y="70" width="3" height="14" fill="#4a4a62"/>
  <rect x="307" y="70" width="3" height="14" fill="#4a4a62"/>
  <!-- 노트북 1 -->
  <rect x="76" y="52" width="32" height="12" fill="#3a3a48" stroke="#4a4a62" stroke-width="1"/>
  <rect x="78" y="54" width="28" height="8" fill="#4f6fff" opacity="0.55"/>
  <!-- 노트북 2 -->
  <rect x="124" y="52" width="32" height="12" fill="#3a3a48" stroke="#4a4a62" stroke-width="1"/>
  <rect x="126" y="54" width="28" height="8" fill="#3ec07b" opacity="0.45"/>
  <!-- 노트북 3 -->
  <rect x="172" y="52" width="32" height="12" fill="#3a3a48" stroke="#4a4a62" stroke-width="1"/>
  <rect x="174" y="54" width="28" height="8" fill="#f2c94c" opacity="0.45"/>
  <!-- 노트북 4 -->
  <rect x="220" y="52" width="32" height="12" fill="#3a3a48" stroke="#4a4a62" stroke-width="1"/>
  <rect x="222" y="54" width="28" height="8" fill="#e55f5f" opacity="0.45"/>
  <!-- 커피컵 -->
  <rect x="112" y="56" width="9" height="8" fill="#9b9bb0"/>
  <ellipse cx="116.5" cy="56" rx="4.5" ry="1.4" fill="#6a6a78"/>
  <rect x="208" y="56" width="9" height="8" fill="#9b9bb0"/>
  <ellipse cx="212.5" cy="56" rx="4.5" ry="1.4" fill="#6a6a78"/>
  <!-- 포스트잇 (벽) -->
  <rect x="80" y="20" width="13" height="13" fill="#f2c94c" opacity="0.85" transform="rotate(-6 86.5 26.5)"/>
  <rect x="100" y="24" width="13" height="13" fill="#e55f5f" opacity="0.75" transform="rotate(4 106.5 30.5)"/>
  <rect x="120" y="20" width="13" height="13" fill="#3ec07b" opacity="0.75" transform="rotate(-3 126.5 26.5)"/>
  <rect x="180" y="24" width="13" height="13" fill="#4f6fff" opacity="0.7" transform="rotate(2 186.5 30.5)"/>
  <rect x="200" y="20" width="13" height="13" fill="#f2c94c" opacity="0.7" transform="rotate(-4 206.5 26.5)"/>
  <!-- 의자 등받이 -->
  <rect x="86" y="84" width="13" height="13" fill="#3a3a48" rx="2"/>
  <rect x="134" y="84" width="13" height="13" fill="#3a3a48" rx="2"/>
  <rect x="182" y="84" width="13" height="13" fill="#3a3a48" rx="2"/>
  <rect x="230" y="84" width="13" height="13" fill="#3a3a48" rx="2"/>
  <!-- 박스 더미(이사 안 끝남 느낌) -->
  <rect x="266" y="40" width="34" height="34" fill="#4a4a62" stroke="#6a6a78" stroke-width="1"/>
  <line x1="266" y1="57" x2="300" y2="57" stroke="#6a6a78" stroke-width="1"/>
  <line x1="283" y1="40" x2="283" y2="74" stroke="#6a6a78" stroke-width="1"/>
  <rect x="270" y="22" width="20" height="18" fill="#5a4a35" stroke="#6a6a78" stroke-width="1"/>
</svg>
