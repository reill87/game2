  <!-- Fourth building (far right) -->
  <rect x="212" y="40" width="30" height="42" fill="#b8cce0" rx="2"/>
  <rect x="216" y="44" width="5" height="4" fill="url(#glass4)" rx="1"/>
  <rect x="224" y="44" width="5" height="4" fill="url(#glass4)" rx="1"/>
  <rect x="232" y="44" width="5" height="4" fill="url(#glass4)" rx="1"/>
  <rect x="216" y="51" width="5" height="4" fill="url(#glass4)" rx="1"/>
  <rect x="224" y="51" width="5" height="4" fill="#ffd700" rx="1" opacity="0.7"/>
  <rect x="232" y="51" width="5" height="4" fill="url(#glass4)" rx="1"/>
  <rect x="212" y="36" width="30" height="5" fill="#283593" rx="1"/>

  <!-- Connecting walkway/bridge between buildings -->
  <rect x="85" y="55" width="10" height="4" fill="#90a4ae" rx="1"/>
  <rect x="147" y="50" width="13" height="4" fill="#90a4ae" rx="1"/>

  <!-- Company logos on facades -->
  <!-- Main tower logo (simplified circle + text) -->
  <circle cx="121" cy="67" r="6" fill="#1565c0" opacity="0.9"/>
  <text x="121" y="69.5" text-anchor="middle" font-size="5" fill="#fff" font-family="sans-serif" font-weight="bold">K</text>

  <!-- Road/path -->
  <rect x="60" y="88" width="200" height="6" fill="#9e9e9e" rx="1"/>
  <!-- Road markings -->
  <rect x="100" y="90.5" width="12" height="1" fill="#fff" opacity="0.6"/>
  <rect x="124" y="90.5" width="12" height="1" fill="#fff" opacity="0.6"/>
  <rect x="148" y="90.5" width="12" height="1" fill="#fff" opacity="0.6"/>
  <rect x="172" y="90.5" width="12" height="1" fill="#fff" opacity="0.6"/>
  <rect x="196" y="90.5" width="12" height="1" fill="#fff" opacity="0.6"/>

  <!-- Fountain in center plaza -->
  <ellipse cx="160" cy="87" rx="8" ry="3" fill="#90caf9" opacity="0.6"/>
  <circle cx="160" cy="85" r="1.5" fill="#b3e5fc" opacity="0.8"/>
</svg>
