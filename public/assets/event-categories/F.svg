    <rect x="92" y="58" width="2" height="2" opacity="0.7"/>
    <rect x="104" y="28" width="2" height="2" opacity="0.85"/>
    <rect x="110" y="36" width="2" height="2" opacity="0.7"/>
    <rect x="116" y="46" width="2" height="2" opacity="0.85"/>
