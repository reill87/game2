<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <!-- H. 코미디·민간신앙 — 행운부적 + 사주 두루마리 + 별가루 (텍스트 없이) -->
  <defs>
    <linearGradient id="hBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1a28"/>
      <stop offset="1" stop-color="#1a0e1a"/>
    </linearGradient>
    <linearGradient id="hPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2c94c"/>
      <stop offset="1" stop-color="#c89c2a"/>
    </linearGradient>
  </defs>
  <rect width="240" height="80" fill="url(#hBg)"/>
  <!-- 별가루 -->
  <g fill="#f2c94c" opacity="0.85">
    <path d="M30 18 L31.5 21 L34.5 21 L32 23 L33 26 L30 24 L27 26 L28 23 L25.5 21 L28.5 21 Z"/>
    <path d="M210 24 L211.2 26.5 L213.7 26.5 L211.7 28 L212.5 30.5 L210 29 L207.5 30.5 L208.3 28 L206.3 26.5 L208.8 26.5 Z" opacity="0.7"/>
    <circle cx="200" cy="60" r="1"/>
    <circle cx="20" cy="58" r="1"/>
    <circle cx="46" cy="68" r="0.8"/>
  </g>
  <!-- 부적 (왼쪽, 약간 기울임) -->
  <g transform="translate(78 40) rotate(-6)">
    <!-- 그림자 -->
    <rect x="-19" y="-25" width="38" height="50" rx="2" fill="#000" opacity="0.4"/>
    <!-- 본체 -->
    <rect x="-20" y="-26" width="40" height="50" rx="2" fill="url(#hPaper)"/>
    <!-- 빨간 도장 자국 -->
    <circle cx="0" cy="-8" r="9" fill="#e55f5f" opacity="0.9"/>
    <text x="0" y="-3" font-family="serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">運</text>
    <!-- 묵 글씨 줄 -->
    <line x1="-12" y1="6" x2="12" y2="6" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="-10" y1="11" x2="10" y2="11" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="-12" y1="16" x2="12" y2="16" stroke="#1a1a22" stroke-width="1.2"/>
    <!-- 모서리 점 -->
    <circle cx="-15" cy="-21" r="1" fill="#7a2222"/>
    <circle cx="15" cy="-21" r="1" fill="#7a2222"/>
    <circle cx="-15" cy="20" r="1" fill="#7a2222"/>
    <circle cx="15" cy="20" r="1" fill="#7a2222"/>
  </g>
  <!-- 두루마리 (오른쪽) -->
  <g transform="translate(160 40) rotate(8)">
    <!-- 그림자 -->
    <rect x="-21" y="-23" width="44" height="46" rx="2" fill="#000" opacity="0.4"/>
    <!-- 종이 -->
    <rect x="-22" y="-24" width="44" height="46" rx="2" fill="#e8d8b4"/>
    <!-- 좌우 두루마리 끝 -->
    <rect x="-26" y="-24" width="6" height="46" rx="2" fill="#5a3525"/>
    <rect x="20" y="-24" width="6" height="46" rx="2" fill="#5a3525"/>
    <circle cx="-23" cy="-24" r="1.5" fill="#3a2820"/>
    <circle cx="-23" cy="22" r="1.5" fill="#3a2820"/>
    <circle cx="23" cy="-24" r="1.5" fill="#3a2820"/>
    <circle cx="23" cy="22" r="1.5" fill="#3a2820"/>
    <!-- 글씨 줄 -->
    <g stroke="#3a2820" stroke-width="1.4" opacity="0.85" stroke-linecap="round">
      <line x1="-16" y1="-16" x2="16" y2="-16"/>
      <line x1="-16" y1="-8" x2="14" y2="-8"/>
      <line x1="-16" y1="0" x2="16" y2="0"/>
      <line x1="-16" y1="8" x2="10" y2="8"/>
      <line x1="-16" y1="16" x2="14" y2="16"/>
    </g>
    <!-- 빨간 인장 -->
    <rect x="6" y="6" width="10" height="10" fill="#e55f5f" rx="1" opacity="0.85"/>
  </g>
</svg>
