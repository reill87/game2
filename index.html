<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>개발팀 키우기 (프로토타입)</title>
  </head>
  <body>
    <div id="app">
      <!-- Phaser 부팅 중(자산 로드 전) 화면이 비어 보이지 않도록 초기 스피너. BootScene preload 완료 후 제거. -->
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0e0e12;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
          <div style="width: 48px; height: 48px; border: 4px solid #2a2a38; border-top-color: #4f6fff; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
          <div style="color: #9b9bb0; font-size: 14px;">로딩 중...</div>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
